# Railway/Nixpacks build for the FastAPI backend.
# uv reads .python-version (3.13) and installs the interpreter itself, then
# syncs the locked dependency set. Keep the start command in sync with railway.json.

[phases.setup]
nixPkgs = ["uv"]

[phases.install]
cmds = ["uv sync --frozen --no-dev"]

[start]
cmd = "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
